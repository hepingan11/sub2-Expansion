name: sub2-expansion

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sub2_expansion}
      POSTGRES_USER: ${POSTGRES_USER:-sub2_expansion}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-sub2-expansion}
      TZ: ${TZ:-Asia/Shanghai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend-go
      args:
        APP_VERSION: ${APP_VERSION:-v0.2}
    image: sub2-expansion-backend:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      SERVER_PORT: 8625
      DB_URL: "postgres://${POSTGRES_USER:-sub2_expansion}:${POSTGRES_PASSWORD:-change-me-sub2-expansion}@postgres:5432/${POSTGRES_DB:-sub2_expansion}?sslmode=disable&TimeZone=Asia/Shanghai"
      DB_USERNAME: ${POSTGRES_USER:-sub2_expansion}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-change-me-sub2-expansion}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      AUTH_SECRET: ${AUTH_SECRET:-please-change-this-secret-before-production}
      AUTH_TOKEN_TTL_HOURS: ${AUTH_TOKEN_TTL_HOURS:-24}
      APP_VERSION: ${APP_VERSION:-v0.2}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-hepingan11/sub2-Expansion}
      SYSTEM_UPDATE_ENABLED: ${SYSTEM_UPDATE_ENABLED:-true}
      SYSTEM_UPDATE_COMMAND: ${SYSTEM_UPDATE_COMMAND:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      FRONTEND_PUBLIC_URL: ${FRONTEND_PUBLIC_URL:-}
      CHECK_IN_DAILY_MAX_USERS: ${CHECK_IN_DAILY_MAX_USERS:-20}
      SUB2API_BASE_URL: ${SUB2API_BASE_URL:-}
      SUB2API_ADMIN_API_KEY: ${SUB2API_ADMIN_API_KEY:-}
      SUB2API_ADMIN_EMAIL: ${SUB2API_ADMIN_EMAIL:-}
      SUB2API_ADMIN_PASSWORD: ${SUB2API_ADMIN_PASSWORD:-}
      SUB2API_TIMEOUT_SECONDS: ${SUB2API_TIMEOUT_SECONDS:-15}
      SUB2API_TOKEN_REFRESH_ENABLED: ${SUB2API_TOKEN_REFRESH_ENABLED:-true}
      SUB2API_TOKEN_REFRESH_INTERVAL_SECONDS: ${SUB2API_TOKEN_REFRESH_INTERVAL_SECONDS:-300}
      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_BOT_API_BASE_URL: ${TELEGRAM_BOT_API_BASE_URL:-https://api.telegram.org}
      TELEGRAM_BOT_POLL_INTERVAL_SECONDS: ${TELEGRAM_BOT_POLL_INTERVAL_SECONDS:-2}
    expose:
      - "8625"
    volumes:
      - ${PROJECT_DIR:-.}:/opt/sub2-Expansion
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8625/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE: ${VITE_API_BASE:-}
    image: sub2-expansion-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-6779}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
